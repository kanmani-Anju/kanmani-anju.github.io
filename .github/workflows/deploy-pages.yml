# Builds Vite to ./dist and publishes to GitHub Pages.
# Repo → Settings → Pages → Source: GitHub Actions (once).
# User/org Pages repo (*.github.io): assets base "/". Project Pages: "/<repo>/".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            export VITE_BASE_PATH=/
          else
            export VITE_BASE_PATH="/${REPO_NAME}/"
          fi
          echo "VITE_BASE_PATH=$VITE_BASE_PATH"
          npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/404.html
          test -d dist/assets
          test -n "$(find dist/assets -name '*.js' | head -1)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
